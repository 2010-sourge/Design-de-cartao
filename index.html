<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Card - iPhone 12</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="page-bg">
    <div class="card">
      <!-- Lado esquerdo: informações -->
      <div class="card__info">
        <h1 class="card__title">iPhone 12</h1>
 
        <div class="card__stars" aria-label="4 de 5 estrelas">
          <span class="star filled">★</span>
          <span class="star filled">★</span>
          <span class="star filled">★</span>
          <span class="star filled">★</span>
          <span class="star">★</span>
        </div>
 
        <p class="card__description">
          Lorem ipsum dolor sit amet, consectetur adipisicingbr elit.
          Laudantium delectus eligendi, maxime accusantium
        </p>
 
        <button class="card__btn">
          Buy Now &nbsp; <span class="card__price">$1225</span>
        </button>
      </div>
 
      <!-- Lado direito: imagem -->
      <div class="card__image-wrap">
        <img
          src="https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-12-select-family-2020?wid=800&hei=800&fmt=jpeg&qlt=95&.v=1604021663000"
          alt="iPhone 12 em três cores"
          class="card__image"
        />
      </div>
    </div>
  </div>
</body>
</html>
